kind = "web"
previewPath = "/"
title = "OnChainArt Gallery"
version = "1.0.0"
id = "artifacts/onchain-art"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25038

[services.development]
run = "pnpm --filter @workspace/onchain-art run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onchain-art", "run", "build" ]
publicDir = "artifacts/onchain-art/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25038"
BASE_PATH = "/"
